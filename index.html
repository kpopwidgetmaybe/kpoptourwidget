<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Tour Widget</title>
    <script>
        // Function to fetch and parse static data
        async function fetchAndParseData() {
            const response = await fetch('https://www.soompi.com/'); // Fetching data from Soompi
            const data = await response.text();
            // Here you could parse the data, for example, using DOMParser
            const parser = new DOMParser();
            const doc = parser.parseFromString(data, 'text/html');
            // Assume we just want to extract some elements, adjust as needed
            const articles = doc.querySelectorAll('.article-title'); // Example selector
            let parsedData = Array.from(articles).map(article => article.textContent);
            localStorage.setItem('soompiData', JSON.stringify(parsedData)); // Store in localStorage
            displayData(parsedData);
        }

        function displayData(data) {
            const output = document.getElementById('output');
            output.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.textContent = item;
                output.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Check localStorage for existing data
            const existingData = localStorage.getItem('soompiData');
            if (existingData) {
                displayData(JSON.parse(existingData)); // Display existing data
            } else {
                fetchAndParseData(); // No existing data, fetch it
            }
        });
    </script>
</head>
<body>
    <h1>K-Pop Tour Widget</h1>
    <div id="output"></div>
</body>
</html>
