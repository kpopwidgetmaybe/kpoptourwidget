<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Tour Widget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tour-container">
        <h1>K-Pop Tour in North America 2026</h1>
        <div id="tour-list"></div>
    </div>
    <script>
        // Sample K-Pop tour data for 2026
        const tourData = [
            { artist: "BTS", date: "2026-05-01", venue: "United Center, Chicago, IL" },
            { artist: "Blackpink", date: "2026-05-10", venue: "Madison Square Garden, New York, NY" },
            { artist: "EXO", date: "2026-06-01", venue: "Staples Center, Los Angeles, CA" }
        ];

        // Function to load tour data from local variable
        function loadTourData() {
            // Saving the tour data to localStorage
            localStorage.setItem('kpopTourData', JSON.stringify(tourData));

            // Retrieving the tour data from localStorage
            const data = JSON.parse(localStorage.getItem('kpopTourData'));
            const tourList = document.getElementById('tour-list');

            if (data) {
                data.forEach(tour => {
                    const tourItem = document.createElement('div');
                    tourItem.classList.add('tour-item');
                    tourItem.innerHTML = `<strong>${tour.artist}</strong> - ${tour.date} @ ${tour.venue}`;
                    tourList.appendChild(tourItem);
                });
            }
        }

        // Call function to load and display tour data
        loadTourData();
    </script>
</body>
</html>
