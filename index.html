<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Pop North America Tour Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #ff3366;
    --accent2: #7c3aed;
    --new-glow: #ff3366;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #10b981;
    --canada: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 40px 24px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,58,237,0.08) 0%, transparent 100%);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #c084fc 50%, #ff3366 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 6px;
  }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .source-link:hover { opacity: 1; color: var(--accent); }

  .controls {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary:hover { background: #e0274f; }

  .filter-group {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--card);
    color: var(--text);
    border-color: var(--accent2);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }

  .stats-bar {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto 0;
    padding: 0 24px 16px;
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
  }
  .stat-num.new { color: var(--accent); }
  .stat-num.total { color: var(--text); }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .state-msg {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .state-msg .icon { font-size: 48px; margin-bottom: 16px; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Month sections */
  .month-section { margin-bottom: 40px; }

  .month-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 16px;
  }

  /* Date group */
  .date-group { margin-bottom: 20px; }

  .date-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  /* Tour stop card */
  .stop-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .stop-card:hover {
    border-color: var(--accent2);
    transform: translateX(3px);
  }

  .stop-card.is-new {
    border-color: rgba(255,51,102,0.4);
    background: linear-gradient(90deg, rgba(255,51,102,0.06) 0%, var(--card) 60%);
  }
  .stop-card.is-new::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .stop-card.is-canada {
    border-color: rgba(255,107,53,0.3);
  }
  .stop-card.is-canada.is-new {
    border-color: rgba(255,107,53,0.5);
    background: linear-gradient(90deg, rgba(255,107,53,0.08) 0%, var(--card) 60%);
  }
  .stop-card.is-canada.is-new::before {
    background: var(--canada);
    box-shadow: 0 0 12px var(--canada);
  }
  .stop-card.is-canada:not(.is-new)::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--canada);
    opacity: 0.4;
  }

  .new-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
    background: var(--accent);
    color: white;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .is-canada .new-badge { background: var(--canada); }

  .stop-artist {
    font-weight: 500;
    font-size: 15px;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }

  .stop-tour {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .stop-location {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .country-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .country-tag.us {
    background: rgba(124,58,237,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }
  .country-tag.ca {
    background: rgba(255,107,53,0.15);
    color: #fdba74;
    border: 1px solid rgba(255,107,53,0.3);
  }

  .stop-city {
    font-size: 13px;
    color: var(--text);
    text-align: right;
  }
  .stop-venue {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .empty-month {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    padding: 8px 12px;
  }

  .last-seen-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 18px;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .mark-seen-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border: 1px solid var(--green);
    color: var(--green);
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mark-seen-btn:hover { background: rgba(16,185,129,0.1); }

  .error-box {
    background: rgba(255,51,102,0.08);
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>K-Pop North America</h1>
      <div class="subtitle">// 2026 tour tracker — US & Canada only</div>
    </div>
    <a href="https://www.soompi.com/article/1797016wpp/2026-k-pop-tour-masterlist-concerts-fan-meetings-and-more" 
       target="_blank" class="source-link">↗ soompi.com</a>
  </div>
</header>

<div class="controls">
  <button class="btn primary" id="refreshBtn" onclick="fetchAndParse()">↻ Fetch Latest</button>

  <div class="filter-group">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" id="filter-new" onclick="setFilter('new')">New Only</button>
    <button class="filter-btn" id="filter-us" onclick="setFilter('us')">🇺🇸 US</button>
    <button class="filter-btn" id="filter-ca" onclick="setFilter('ca')">🇨🇦 Canada</button>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none;">
  <div class="stat">
    <span class="stat-num total" id="totalCount">0</span>
    <span>total stops</span>
  </div>
  <div class="stat">
    <div class="stat-dot"></div>
    <span class="stat-num new" id="newCount">0</span>
    <span>new since last visit</span>
  </div>
</div>

<main id="main">
  <div class="state-msg">
    <div class="icon">🎤</div>
    <p>Press <strong>Fetch Latest</strong> to load North American K-Pop tour stops</p>
  </div>
</main>

<script>
const SOOMPI_URL = "https://www.soompi.com/article/1797016wpp/2026-k-pop-tour-masterlist-concerts-fan-meetings-and-more";
const STORAGE_KEY = "kpop-seen-stops";
const LAST_FETCH_KEY = "kpop-last-fetch";

let allStops = [];
let seenStops = new Set();
let currentFilter = 'all';
let lastFetchDate = null;

// US states abbreviations for detection
const US_STATES = [
  'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA',
  'KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ',
  'NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT',
  'VA','WA','WV','WI','WY','DC'
];

const CANADA_PROVINCES = ['ON','QC','BC','AB','MB','SK','NS','NB','NL','PE','NT','YT','NU'];

// Common Canadian cities that might not have province abbreviations
const CANADA_CITIES = ['toronto','vancouver','montreal','calgary','edmonton','ottawa','winnipeg','hamilton','victoria','québec','quebec'];

function isNorthAmerica(location) {
  const loc = location.toLowerCase();
  const locRaw = location;

  // Check for Canadian cities
  if (CANADA_CITIES.some(c => loc.includes(c))) return { country: 'CA' };

  // Check for province abbreviation like "Toronto, ON"
  if (CANADA_PROVINCES.some(p => new RegExp(`\\b${p}\\b`).test(locRaw))) return { country: 'CA' };

  // Check for US state abbreviations like "New York, NY"
  if (US_STATES.some(s => new RegExp(`\\b${s}\\b`).test(locRaw))) return { country: 'US' };

  return null;
}

function makeStopId(stop) {
  return `${stop.date}|${stop.artist}|${stop.location}`;
}

async function loadStorage() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (result && result.value) {
      seenStops = new Set(JSON.parse(result.value));
    }
  } catch(e) {
    seenStops = new Set();
  }
  try {
    const result2 = await window.storage.get(LAST_FETCH_KEY);
    if (result2 && result2.value) {
      lastFetchDate = result2.value;
    }
  } catch(e) {}
}

async function saveSeenStops() {
  const arr = Array.from(seenStops);
  await window.storage.set(STORAGE_KEY, JSON.stringify(arr));
}

async function markAllSeen() {
  allStops.forEach(s => seenStops.add(makeStopId(s)));
  await saveSeenStops();
  await window.storage.set(LAST_FETCH_KEY, new Date().toISOString());
  lastFetchDate = new Date().toISOString();
  renderStops();
}

async function fetchAndParse() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Fetching...';
  btn.disabled = true;

  await loadStorage();

  document.getElementById('main').innerHTML = `
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Fetching tour data from Soompi...</p>
    </div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        system: `You are a data extraction assistant. The user will give you raw text from the Soompi 2026 K-Pop Tour Masterlist page. 
Extract ONLY the tour stops that are located in the United States or Canada.
Return ONLY a valid JSON array with no markdown, no explanation, no preamble.
Each object: { "date": "Month D", "month": "Month YYYY", "artist": "ARTIST NAME", "tour": "Tour Name", "city": "City, STATE/PROV", "venue": "Venue Name", "country": "US" or "CA" }
If no stops found, return [].`,
        messages: [{
          role: "user",
          content: `Please extract all US and Canadian tour stops from this Soompi K-Pop tour masterlist page. Fetch and parse this URL: ${SOOMPI_URL}\n\nHere is the raw text content of the page for you to parse:\n\n${await fetchPageText()}`
        }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    allStops = JSON.parse(clean);

    await window.storage.set(LAST_FETCH_KEY, new Date().toISOString());
    lastFetchDate = new Date().toISOString();

    renderStops();
  } catch(err) {
    document.getElementById('main').innerHTML = `
      <div class="error-box">
        <p>⚠️ Could not load tour data. Please try again.</p>
        <p style="margin-top:8px;font-size:12px;opacity:0.6;">${err.message}</p>
      </div>`;
  }

  btn.textContent = '↻ Fetch Latest';
  btn.disabled = false;
}

async function fetchPageText() {
  // We'll use the Claude API to fetch the page via its own tools
  // But we need to send the raw page content - let's fetch it client side first
  // Unfortunately CORS blocks direct fetch. We'll use the Claude API with web search to get the content.
  return "Please use the Soompi URL provided to fetch the current 2026 K-Pop Tour Masterlist and extract US/Canada stops.";
}

async function fetchAndParseViaAPI() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Fetching...';
  btn.disabled = true;

  await loadStorage();

  document.getElementById('main').innerHTML = `
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Loading tour data via AI...</p>
    </div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 4000,
        tools: [{ "type": "web_search_20250305", "name": "web_search" }],
        system: `You are a data extraction assistant. Search the Soompi 2026 K-Pop Tour Masterlist and extract ALL tour stops in the United States and Canada.
Return ONLY a valid JSON array with no markdown, no explanation, no preamble.
Each object must have exactly these fields: { "date": "Month D", "month": "Month YYYY", "artist": "ARTIST NAME", "tour": "Tour Name", "city": "City, STATE", "venue": "Venue Name", "country": "US" or "CA" }
Be thorough - include every single US and Canada stop you find. Return [] if none found.`,
        messages: [{
          role: "user",
          content: `Search for the Soompi 2026 K-Pop Tour Masterlist at https://www.soompi.com/article/1797016wpp/2026-k-pop-tour-masterlist-concerts-fan-meetings-and-more and extract ALL tour stops located in the United States or Canada. Return only JSON array.`
        }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json[\s\S]*?```|```[\s\S]*?```/g, m => m.replace(/```json\n?|```\n?/g, '')).trim();

    // Find the JSON array in the response
    const jsonMatch = clean.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error("No JSON array found in response");

    allStops = JSON.parse(jsonMatch[0]);

    await window.storage.set(LAST_FETCH_KEY, new Date().toISOString());
    lastFetchDate = new Date().toISOString();

    renderStops();
  } catch(err) {
    document.getElementById('main').innerHTML = `
      <div class="error-box">
        <p>⚠️ Could not load tour data. Please try again.</p>
        <p style="margin-top:8px;font-size:12px;opacity:0.6;">${err.message}</p>
      </div>`;
  }

  btn.textContent = '↻ Fetch Latest';
  btn.disabled = false;
}

// Override the main function
window.fetchAndParse = fetchAndParseViaAPI;

function setFilter(f) {
  currentFilter = f;
  ['all','new','us','ca'].forEach(id => {
    document.getElementById(`filter-${id}`).classList.toggle('active', id === f);
  });
  renderStops();
}

function renderStops() {
  if (!allStops.length) {
    document.getElementById('main').innerHTML = `<div class="error-box"><p>No US/Canada tour stops found. Try fetching again.</p></div>`;
    return;
  }

  const newStops = allStops.filter(s => !seenStops.has(makeStopId(s)));

  // Update stats
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('totalCount').textContent = allStops.length;
  document.getElementById('newCount').textContent = newStops.length;

  // Filter
  let filtered = allStops;
  if (currentFilter === 'new') filtered = allStops.filter(s => !seenStops.has(makeStopId(s)));
  if (currentFilter === 'us') filtered = allStops.filter(s => s.country === 'US');
  if (currentFilter === 'ca') filtered = allStops.filter(s => s.country === 'CA');

  if (!filtered.length) {
    document.getElementById('main').innerHTML = `<div class="state-msg"><p>No stops match this filter.</p></div>`;
    return;
  }

  // Group by month then date
  const byMonth = {};
  filtered.forEach(stop => {
    const m = stop.month || 'Unknown';
    const d = stop.date || 'Unknown';
    if (!byMonth[m]) byMonth[m] = {};
    if (!byMonth[m][d]) byMonth[m][d] = [];
    byMonth[m][d].push(stop);
  });

  const lastSeenStr = lastFetchDate 
    ? `Last fetched: ${new Date(lastFetchDate).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}`
    : 'First visit — all stops marked as new';

  let html = `
    <div class="last-seen-bar">
      <span>${lastSeenStr} · ${newStops.length} new stop${newStops.length !== 1 ? 's' : ''} detected</span>
      <button class="mark-seen-btn" onclick="markAllSeen()">✓ Mark All as Seen</button>
    </div>`;

  for (const [month, dates] of Object.entries(byMonth)) {
    html += `<div class="month-section"><div class="month-header">${month}</div>`;
    for (const [date, stops] of Object.entries(dates)) {
      html += `<div class="date-group"><div class="date-label">${date}</div>`;
      stops.forEach(stop => {
        const isNew = !seenStops.has(makeStopId(stop));
        const isCA = stop.country === 'CA';
        html += `
          <div class="stop-card ${isNew ? 'is-new' : ''} ${isCA ? 'is-canada' : ''}">
            ${isNew ? `<span class="new-badge">NEW</span>` : ''}
            <div class="stop-artist">${stop.artist}</div>
            <div class="stop-tour">${stop.tour || ''}</div>
            <div class="stop-location">
              <div>
                <div class="stop-city">${stop.city}</div>
                <div class="stop-venue">${stop.venue || ''}</div>
              </div>
              <span class="country-tag ${isCA ? 'ca' : 'us'}">${stop.country}</span>
            </div>
          </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('main').innerHTML = html;
}

// Init
loadStorage();
</script>
</body>
</html>
